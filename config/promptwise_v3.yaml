# PromptWise V3 — Unified Configuration
version: "3.0"
default_model: claude-sonnet-4-6
last_verified: "2026-06-08"

# ============================================================================
# Model Pricing
# ============================================================================
models:
  claude-haiku-4-5-20251001:
    display_name: "Claude Haiku 4.5"
    provider: claude
    tier: fast
    context_window: 200000
    max_output: 8192
    rates:
      input_per_mtok: 1.0
      output_per_mtok: 5.0
      cache_write_per_mtok: 1.25
      cache_hit_per_mtok: 0.10
  claude-sonnet-4-6:
    display_name: "Claude Sonnet 4.6"
    provider: claude
    tier: balanced
    context_window: 200000
    max_output: 8192
    rates:
      input_per_mtok: 3.0
      output_per_mtok: 15.0
      cache_write_per_mtok: 3.75
      cache_hit_per_mtok: 0.30
  claude-opus-4-7:
    display_name: "Claude Opus 4.7"
    provider: claude
    tier: powerful
    context_window: 200000
    max_output: 8192
    rates:
      input_per_mtok: 15.0
      output_per_mtok: 75.0
      cache_write_per_mtok: 18.75
      cache_hit_per_mtok: 1.50
  gpt-4o:
    display_name: "GPT-4o"
    provider: openai
    tier: balanced
    context_window: 128000
    max_output: 4096
    rates:
      input_per_mtok: 2.5
      output_per_mtok: 10.0
      cache_write_per_mtok: 0.0
      cache_hit_per_mtok: 0.0
  gpt-4o-mini:
    display_name: "GPT-4o Mini"
    provider: openai
    tier: fast
    context_window: 128000
    max_output: 4096
    rates:
      input_per_mtok: 0.15
      output_per_mtok: 0.60
      cache_write_per_mtok: 0.0
      cache_hit_per_mtok: 0.0
  gemini-2.0-flash:
    display_name: "Gemini 2.0 Flash"
    provider: gemini
    tier: fast
    context_window: 1000000
    max_output: 8192
    rates:
      input_per_mtok: 0.10
      output_per_mtok: 0.40
      cache_write_per_mtok: 0.0
      cache_hit_per_mtok: 0.0
  gemini-2.0-pro:
    display_name: "Gemini 2.0 Pro"
    provider: gemini
    tier: powerful
    context_window: 2000000
    max_output: 8192
    rates:
      input_per_mtok: 1.5
      output_per_mtok: 5.0
      cache_write_per_mtok: 0.0
      cache_hit_per_mtok: 0.0

# ============================================================================
# Provider Configuration
# ============================================================================
providers:
  mcp:
    display_name: "MCP (Claude Code)"
    aliases: [claude, anthropic]
    tiers:
      fast: claude-haiku-4-5-20251001
      balanced: claude-sonnet-4-6
      powerful: claude-opus-4-7
  codex:
    display_name: "Codex (OpenAI)"
    aliases: [openai, codex]
    tiers:
      fast: claude-haiku-4-5-20251001
      balanced: gpt-4o
      powerful: claude-opus-4-7
  gemini:
    display_name: "Gemini (Google)"
    aliases: [google]
    tiers:
      fast: gemini-2.0-flash
      balanced: claude-sonnet-4-6
      powerful: gemini-2.0-pro
  antigravity:
    display_name: "Antigravity CLI"
    aliases: [ag]
    tiers:
      fast: claude-haiku-4-5-20251001
      balanced: claude-sonnet-4-6
      powerful: claude-opus-4-7

