# ============================================================================
# Timeout / Session Management
# ============================================================================
timeout:
  idle_threshold_minutes: 30
  warn_threshold_minutes: 20
  auto_action: prompt_user

# ============================================================================
# Auto-Compact
# ============================================================================
auto_compact:
  threshold_pct: 0.70
  threshold_tokens: 50000
  target_pct: 0.50

# ============================================================================
# Policies
# ============================================================================
policies:
  max_tokens_per_session: 500000
  budget_hard_stop_usd: 10.0
  daily_burn_warn_usd: 3.0
  team_budget_usd: 100.0

# ============================================================================
# Security
# ============================================================================
security:
  checks:
    - secrets
    - destructive
    - supply_chain
    - permissions
    - pii
    - injection
    - compliance
  pii_detection: true
  pii_action: redact
  injection_detection: true
  injection_threshold: 0.7
  audit_log: true

# ============================================================================
# Skills
# ============================================================================
skills:
  directory: skills/
  auto_trigger: true
  confidence_threshold: 0.6
  chain_mode: sequential
  max_chain_depth: 8
  output_validation: strict

# ============================================================================
# Dashboard
# ============================================================================
dashboard:
  cli_enabled: true
  web_enabled: true
  web_port: 8765

# ============================================================================
# Analytics
# ============================================================================
analytics:
  roi_tracking: true
  per_developer: true
  per_role: true

# ============================================================================
# Orchestration
# ============================================================================
orchestration:
  default_failure_strategy: fallback
  max_retries: 2
  fallback_model_sequence:
    - claude-sonnet-4-6
    - claude-haiku-4-5-20251001

# ============================================================================
# Compression
# ============================================================================
compression:
  enabled: true
  auto_compress_threshold_usd_per_min: 0.01

# ============================================================================
# Memory
# ============================================================================
memory:
  retention_weeks: 4
  cross_session: true
  auto_export_enabled: true
  retention_tiers:
    working: session
    episodic: 4_weeks
    semantic: permanent

# ============================================================================
# Model Routing Strategy
# ============================================================================
model_routing:
  extended_thinking_tokens: 8000
  large_context_threshold: 50000
  large_context_model: claude-sonnet-4-6
  cost_safety:
    downgrade_at_budget_pct: 80
    emergency_haiku_pct: 95
    hard_stop_pct: 100
    never_downgrade:
      - security-architecture
      - systematic-debugging
      - pii-detector
      - injection-detector
  skill_chain_optimization:
    max_parallel: 3
    parallel_capable:
      - pii-detector
      - injection-detector
      - owasp-checker

# ============================================================================
# Compliance Frameworks
# ============================================================================
compliance:
  frameworks:
    banking: [FINRA_3110, PCI_DSS, BASEL_III]
    healthcare: [HIPAA_SafeHarbor, FHIR_R4]
    legal: [GDPR_Art25, CCPA]
    all: [OWASP_Top10, EU_AI_Act]

# ============================================================================
# Intelligence / Autonomous
# ============================================================================
intelligence:
  autocomplete:
    enabled: true
    latency_target_ms: 150
    confidence_threshold: 0.7
  proactive:
    enabled: true
    complexity_threshold: 10
    test_gap_watcher: true
  autonomous_loops:
    enabled: true
    max_iterations: 5
    checkpoint_mode: manual
