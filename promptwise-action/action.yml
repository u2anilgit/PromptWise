name: 'PromptWise Quality Gate'
description: 'Runs PromptWise security checks, code review, and verification hooks'
inputs:
  github-token:
    description: 'GitHub token for PR comments'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run verification checks
      shell: bash
      run: |
        python -c "import promptwise_v2"
        pytest tests/
