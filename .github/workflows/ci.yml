name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Import smoke test
        run: |
          python -c "import promptwise_v3.server"
          python -c "from promptwise_v3.core import WorkflowPlanner; p=WorkflowPlanner().plan('build a HIPAA patient portal from scratch'); print(p.workflow, p.compliance_gate); assert p.compliance_gate and p.steps"
      - name: Tests
        run: pytest -q
