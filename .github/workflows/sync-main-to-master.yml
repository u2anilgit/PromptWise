name: Sync main to master

# Keeps `master` identical to `main` automatically on every push to main.
on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: sync-master
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward master to main
        run: |
          git push origin HEAD:refs/heads/master --force
